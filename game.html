<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rialo Game - HP Touch</title>

<style>
body {
  margin:0;
  padding:0;
  background:#000;
  font-family:Arial;
  color:#fff;
  text-align:center;
  overflow:hidden;
}

#menu {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  flex-direction:column;
}

canvas {
  display:block;
  margin:0 auto;
  background:#000;
  touch-action:none;
}

#grialo {
  position:absolute;
  width:100%;
  height:100%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:40px;
  color:white;
  display:none;
  text-shadow: 0 0 5px #fff, 0 0 10px #ff0, 0 0 20px #f0f, 0 0 30px #0ff;
  animation: glow 1s infinite alternate;
}

@keyframes glow {
  from { text-shadow: 0 0 5px #fff, 0 0 10px #ff0, 0 0 20px #f0f, 0 0 30px #0ff; }
  to { text-shadow: 0 0 15px #fff, 0 0 30px #ff0, 0 0 50px #f0f, 0 0 80px #0ff; }
}

#gameOverText {
  position:absolute;
  width:100%;
  top:40%;
  text-align:center;
  font-size:36px;
  color:red;
  display:none;
}

#restartBtn, #backBtn {
  margin-top:0px;
  padding:10px 20px;
  font-size:16px;
  display:none;
  cursor:pointer;
}
</style>
</head>

<body>

<!-- MENU PILIH GAME -->
<div id="menu">
  <h2>Pilih Game</h2>

  <div style="display:flex; gap:20px;">

    <!-- GAME PESAWAT -->
    <div>
      <img src="images/title.png" style="width:150px;">
      <br>
      <button id="playBtn">Play</button>
    </div>

    <!-- GAME BALAP -->
    <div>
      <a href="rialo-town-race.html">
        <img src="images/rialo-race-cover.png" style="width:150px;">
      </a>
      <p>Rialo Town Race</p>
    </div>

  </div>
</div>

<div id="grialo">grialo</div>

<canvas id="gameCanvas" width="400" height="600" style="display:none;"></canvas>

<div id="gameOverText">GAME OVER</div>
<button id="backBtn">Back</button>
<button id="restartBtn">Restart Game</button>

<script>
const menu = document.getElementById('menu');
const playBtn = document.getElementById('playBtn');
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const grialoDiv = document.getElementById('grialo');
const restartBtn = document.getElementById('restartBtn');
const backBtn = document.getElementById('backBtn');
const gameOverText = document.getElementById('gameOverText');

let gameOver = false;
let score = 0;
let bestScore = localStorage.getItem('bestScore') || 0;

// Ship
const ship = { x: 150, y: 500, width: 100, height: 100 };
const shipImg = new Image();
shipImg.src = 'images/pesawat-logo.png';

// Laser
const lasers = [];
const laserSpeed = 7;

// Monster
const monsters = [];
let monsterSize = 80;
let monsterSpeed = 2;
let spawnDelay = 1500;
let spawnTimer = 0;
const monsterImg = new Image();
monsterImg.src = 'images/monster-logo.png';

// Background
const stars = [];
for(let i=0;i<100;i++){
  stars.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, size: Math.random()*2+1 });
}

function drawStars(){
  ctx.fillStyle='white';
  stars.forEach(s=>{
    ctx.beginPath();
    ctx.arc(s.x,s.y,s.size,0,Math.PI*2);
    ctx.fill();
    s.y+=1;
    if(s.y>canvas.height)s.y=0;
  });
}

// Spawn monster
function spawnMonsters(){
  monsters.push({
    x: Math.random()*(canvas.width-80),
    y:-80,
    width:80,
    height:80
  });
}

// Shoot
function shootLaser(){
  lasers.push({ x: ship.x+45, y: ship.y, width:5, height:20 });
}

// Update
function update(){
  if(gameOver) return;

  spawnTimer+=16;
  if(spawnTimer>1500){
    spawnMonsters();
    spawnTimer=0;
  }

  lasers.forEach(l=> l.y-=laserSpeed);
  monsters.forEach(m=> m.y+=monsterSpeed);

  monsters.forEach((m,i)=>{
    if(ship.x < m.x+m.width &&
       ship.x+ship.width > m.x &&
       ship.y < m.y+m.height &&
       ship.y+ship.height > m.y){
         gameOver=true;
         gameOverText.style.display='block';
         restartBtn.style.display='block';
         backBtn.style.display='block';
    }
  });
}

// Draw
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  drawStars();
  ctx.drawImage(shipImg, ship.x, ship.y, ship.width, ship.height);
}

// Loop
function loop(){
  update();
  draw();
  requestAnimationFrame(loop);
}

// START GAME PESAWAT (TIDAK DIUBAH)
playBtn.addEventListener('click', ()=>{
  menu.style.display='none';
  grialoDiv.style.display='flex';

  setTimeout(()=>{
    grialoDiv.style.display='none';
    canvas.style.display='block';
    loop();
  },2000);
});

// Control keyboard
document.addEventListener('keydown', e=>{
  if(e.key==='ArrowLeft') ship.x-=10;
  if(e.key==='ArrowRight') ship.x+=10;
  if(e.key===' ') shootLaser();
});
</script>

</body>
</html>
