<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIALO CIRCUIT RACE v3 FIX</title>

<style>
body { margin:0; overflow:hidden; background:#000; }

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:#00ffff;
  font-family:Arial;
  z-index:10;
}

#start{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  background:#ff0033;
  color:white;
  border:none;
  border-radius:10px;
  z-index:10;
}

#ctrl{
  position:absolute;
  bottom:20px;
  left:20px;
  display:flex;
  gap:10px;
  z-index:10;
}

.btn{
  width:55px;
  height:55px;
  background:#222;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  user-select:none;
}
</style>
</head>

<body>

<div id="ui">RIALO CIRCUIT v3 FIX</div>
<button id="start">START</button>

<div id="ctrl">
  <div class="btn" id="left">◀</div>
  <div class="btn" id="right">▶</div>
  <div class="btn" id="gas">▲</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================
// BASIC SETUP
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 30, 200);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0x444444));
const dir = new THREE.DirectionalLight(0xffffff, 1);
dir.position.set(10,20,10);
scene.add(dir);

// =====================
// TRACK (SMOOTH CIRCUIT)
// =====================
const path = [
  {x:0, z:0},
  {x:-20, z:-60},
  {x:20, z:-120},
  {x:-20, z:-180},
  {x:0, z:-240},
  {x:0, z:0}
];

// VISUAL ROAD (follow path)
for(let i=0;i<path.length;i++){
  const p = path[i];

  const roadSeg = new THREE.Mesh(
    new THREE.BoxGeometry(20,0.1,60),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  roadSeg.position.set(p.x,0,p.z);
  scene.add(roadSeg);
}

// =====================
// MARKINGS (CENTER LINE)
// =====================
for(let i=0;i<120;i++){
  const line = new THREE.Mesh(
    new THREE.BoxGeometry(0.3,0.1,2),
    new THREE.MeshBasicMaterial({color:0xffffff})
  );
  line.position.set(0,0.02,-i*4);
  scene.add(line);
}

// =====================
// CAR
// =====================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.6,0.8,3),
  new THREE.MeshStandardMaterial({
    color:0xff0033,
    emissive:0xff0033,
    emissiveIntensity:0.4
  })
);
car.position.set(0,1,0);
scene.add(car);

// =====================
// CAMERA
// =====================
const camOffset = new THREE.Vector3(0,5,10);

// =====================
// CONTROL
// =====================
let steer = 0;
let speed = 0.3;

addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") steer=0.08;
  if(e.key==="ArrowRight") steer=-0.08;
  if(e.key==="ArrowUp") speed=0.6;
});

addEventListener("keyup",()=>{steer=0; speed=0.3;});

document.getElementById("left").ontouchstart=()=>steer=0.08;
document.getElementById("right").ontouchstart=()=>steer=-0.08;
document.getElementById("gas").ontouchstart=()=>speed=0.6;

document.getElementById("left").ontouchend=()=>steer=0;
document.getElementById("right").ontouchend=()=>steer=0;
document.getElementById("gas").ontouchend=()=>speed=0.3;

// =====================
// RACE SYSTEM
// =====================
let index = 0;
let started = false;

document.getElementById("start").onclick = ()=>{
  started = true;
  document.getElementById("ui").innerText = "GO!";
};

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  if(started){

    // forward movement (FIX MAIN ISSUE)
    car.position.z -= speed;

    // steering
    car.rotation.y += steer;

    car.position.x -= Math.sin(car.rotation.y) * speed;

    // TRACK FOLLOW (SMOOTH FIX)
    const target = path[index];

    const dx = target.x - car.position.x;
    const dz = target.z - car.position.z;

    car.position.x += dx * 0.03;
    car.position.z += dz * 0.03;

    // next point
    if(Math.abs(dx)<3 && Math.abs(dz)<3){
      index++;
      if(index >= path.length){
        index = 0; // loop back start
      }
    }
  }

  // CAMERA CHASE FIX
  camera.position.x += (car.position.x + camOffset.x - camera.position.x)*0.12;
  camera.position.y = camOffset.y;
  camera.position.z += (car.position.z + camOffset.z - camera.position.z)*0.12;

  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

animate();

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
