<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIALO FINAL CLEAN RACE</title>

<style>
body { margin:0; overflow:hidden; background:#000; }

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
  font-size:18px;
}

#controls{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}

.btn{
  width:65px;
  height:65px;
  background:#222;
  color:#fff;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="ui">Lap: 1 / 5</div>

<div id="controls">
  <div class="btn" id="left">◀</div>
  <div class="btn" id="gas">▲</div>
  <div class="btn" id="right">▶</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({antialias:false});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== PATH (CIRCUIT JELAS) =====
const path = [
  new THREE.Vector3(0,0,0),
  new THREE.Vector3(0,0,-60),
  new THREE.Vector3(40,0,-100),
  new THREE.Vector3(40,0,-160),
  new THREE.Vector3(0,0,-200),
  new THREE.Vector3(-40,0,-160),
  new THREE.Vector3(-40,0,-100),
  new THREE.Vector3(0,0,-60),
  new THREE.Vector3(0,0,0)
];

// ===== ROAD =====
function road(a,b){
  const dx=b.x-a.x;
  const dz=b.z-a.z;
  const dist=Math.sqrt(dx*dx+dz*dz);

  const r=new THREE.Mesh(
    new THREE.BoxGeometry(10,0.2,dist),
    new THREE.MeshBasicMaterial({color:0x333333})
  );

  r.position.set((a.x+b.x)/2,0,(a.z+b.z)/2);
  r.rotation.y=Math.atan2(dx,dz);
  scene.add(r);

  for(let i=0;i<dist/6;i++){
    const t=i/(dist/6);
    const x=a.x+(b.x-a.x)*t;
    const z=a.z+(b.z-a.z)*t;

    const m=new THREE.Mesh(
      new THREE.BoxGeometry(0.2,0.05,1),
      new THREE.MeshBasicMaterial({color:0xffffff})
    );

    m.position.set(x,0.15,z);
    m.rotation.y=r.rotation.y;
    scene.add(m);
  }
}

for(let i=0;i<path.length-1;i++) road(path[i],path[i+1]);

// ===== GARIS START =====
const finish = new THREE.Mesh(
  new THREE.BoxGeometry(10,0.1,3),
  new THREE.MeshBasicMaterial({color:0xffffff})
);
finish.position.set(0,0.2,0);
scene.add(finish);

// ===== CHECKPOINT GARIS =====
function createCheckpoint(x,z){
  const cp = new THREE.Mesh(
    new THREE.BoxGeometry(10,0.1,2),
    new THREE.MeshBasicMaterial({color:0x00ff00})
  );
  cp.position.set(x,0.2,z);
  scene.add(cp);
  return cp;
}

const checkpoints = [
  createCheckpoint(0,-60),
  createCheckpoint(40,-120),
  createCheckpoint(0,-200),
  createCheckpoint(-40,-120)
];

let cpIndex = 0;
let lap = 1;

// ===== CAR =====
const car=new THREE.Mesh(
  new THREE.BoxGeometry(1.5,0.7,3),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
car.position.set(0,1,5);
scene.add(car);

// ===== INPUT =====
let keys={left:false,right:false,gas:false};

addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") keys.left=true;
  if(e.key==="ArrowRight") keys.right=true;
  if(e.key==="ArrowUp") keys.gas=true;
});
addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft") keys.left=false;
  if(e.key==="ArrowRight") keys.right=false;
  if(e.key==="ArrowUp") keys.gas=false;
});

// mobile
function bind(id,key){
  const el=document.getElementById(id);
  el.ontouchstart=()=>keys[key]=true;
  el.ontouchend=()=>keys[key]=false;
}
bind("left","left");
bind("right","right");
bind("gas","gas");

// ===== DRIVE =====
let speed=0;

function updateCar(){
  if(keys.gas) speed+=0.04;
  speed*=0.97;
  if(speed>1.4) speed=1.4;

  if(keys.left) car.rotation.y+=0.04;
  if(keys.right) car.rotation.y-=0.04;

  car.position.x -= Math.sin(car.rotation.y)*speed;
  car.position.z -= Math.cos(car.rotation.y)*speed;
}

// ===== DETEKSI GARIS =====
function hitLine(obj){
  const dx = Math.abs(car.position.x - obj.position.x);
  const dz = Math.abs(car.position.z - obj.position.z);

  return dx < 6 && dz < 3;
}

// ===== RACE SYSTEM (VALID) =====
function checkRace(){

  // checkpoint harus urut
  if(hitLine(checkpoints[cpIndex])){
    cpIndex++;

    if(cpIndex >= checkpoints.length){

      // harus finish
      if(hitLine(finish)){
        lap++;
        cpIndex = 0;

        if(lap > 5){
          alert("FINISH! 🏁");
          lap = 1;
        }

        document.getElementById("ui").innerText = "Lap: " + lap + " / 5";
      }
    }
  }
}

// ===== CAMERA =====
const offset=new THREE.Vector3(0,4,8);

function cam(){
  const m=new THREE.Matrix4();
  m.extractRotation(car.matrix);

  const behind=offset.clone().applyMatrix4(m);
  const pos=new THREE.Vector3().addVectors(car.position,behind);

  camera.position.lerp(pos,0.1);
  camera.lookAt(car.position);
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  updateCar();
  checkRace();
  cam();

  renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
