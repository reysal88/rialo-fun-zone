<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIALO TRACK FIX v2</title>

<style>
body { margin:0; overflow:hidden; background:#87CEEB; }

#ui{
  position:absolute;
  top:10px;
  left:10px;
  font-family:Arial;
  color:black;
  font-weight:bold;
  z-index:10;
}
</style>
</head>

<body>
<div id="ui">RIALO TRACK FIX v2 - ROAD + NAVIGATION</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ===================
// SCENE
// ===================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,10,15);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===================
// LIGHT (BIAR GAK GELAP)
// ===================
scene.add(new THREE.AmbientLight(0xffffff, 0.7));

const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10,20,10);
scene.add(sun);

// ===================
// ROAD MATERIAL LOOK
// ===================
function createRoadSegment(x,z,rot,length){
  const road = new THREE.Mesh(
    new THREE.BoxGeometry(8,0.2,length),
    new THREE.MeshStandardMaterial({color:0x333333})
  );

  road.position.set(x,0,z);
  road.rotation.y = rot;

  scene.add(road);

  // MARKAH TENGAH
  for(let i=0;i<length/2;i++){
    const line = new THREE.Mesh(
      new THREE.BoxGeometry(0.2,0.1,0.5),
      new THREE.MeshBasicMaterial({color:0xffffff})
    );

    line.position.set(
      x + Math.sin(rot)*i*2,
      0.2,
      z + Math.cos(rot)*i*2
    );

    scene.add(line);
  }
}

// ===================
// TRACK (4 TURNS)
// ===================
createRoadSegment(0,0,0,20);
createRoadSegment(0,-20,Math.PI/2,20);
createRoadSegment(20,-20,0,20);
createRoadSegment(20,-40,Math.PI/2,20);
createRoadSegment(0,-40,Math.PI,20);

// ===================
// NAVIGATION ARROWS
// ===================
function arrow(x,z){
  const a = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,1),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );
  a.position.set(x,1,z);
  scene.add(a);
}

arrow(0,-10);
arrow(0,-30);
arrow(20,-30);

// ===================
// CAR
// ===================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.5,0.8,3),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
car.position.set(0,1,5);
scene.add(car);

// ===================
// MOVE SIMPLE
// ===================
let speed = 0.2;

function animate(){
  requestAnimationFrame(animate);

  car.position.z -= speed;

  camera.position.x = car.position.x;
  camera.position.z = car.position.z + 10;
  camera.position.y = 8;

  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

animate();

</script>

</body>
</html>
