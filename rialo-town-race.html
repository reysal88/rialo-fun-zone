<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Drift City Final</title>

<style>
  body { margin:0; overflow:hidden; background:#000; }
  #ui {
    position:absolute;
    top:10px;
    left:10px;
    color:white;
    font-family:Arial;
    font-size:14px;
    z-index:10;
    opacity:0.8;
  }
</style>
</head>

<body>
<div id="ui">Drift City Final - Arrow Keys to Drive</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// =====================
// BASIC SETUP
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 10, 140);

const camera = new THREE.PerspectiveCamera(
  75,
  window.innerWidth / window.innerHeight,
  0.1,
  1000
);

const renderer = new THREE.WebGLRenderer({ antialias:true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// AMBIENT
scene.add(new THREE.AmbientLight(0x404040));

// =====================
// ROAD CURVE FUNCTION
// =====================
function roadX(z){
  return Math.sin(z * 0.04) * 10;
}

// =====================
// ROAD BUILD
// =====================
const segments = 120;
const segSize = 2;

for(let i=0;i<segments;i++){
  const z = -i * segSize;

  const road = new THREE.Mesh(
    new THREE.PlaneGeometry(14, segSize+1),
    new THREE.MeshStandardMaterial({ color:0x1a1a1a })
  );

  road.rotation.x = -Math.PI/2;
  road.position.set(roadX(z), 0, z);

  scene.add(road);
}

// =====================
// BUILDINGS
// =====================
function addBuilding(x,z){
  const h = Math.random()*20 + 4;

  const b = new THREE.Mesh(
    new THREE.BoxGeometry(3,h,3),
    new THREE.MeshStandardMaterial({ color:0x2b2b2b })
  );

  b.position.set(x, h/2, z);
  scene.add(b);
}

for(let i=0;i<200;i++){
  const z = -i * 2;

  const offset = 10 + Math.random()*12;

  addBuilding(roadX(z)+offset, z);
  addBuilding(roadX(z)-offset, z);
}

// =====================
// CAR
// =====================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.5,0.8,3),
  new THREE.MeshStandardMaterial({ color:0xff0000 })
);

car.position.y = 1;
scene.add(car);

camera.position.set(0,5,10);

// =====================
// CONTROLS
// =====================
let speed = 0.2;
let steer = 0;

document.addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") steer = 0.08;
  if(e.key==="ArrowRight") steer = -0.08;
  if(e.key==="ArrowUp") speed = 0.3;
  if(e.key==="ArrowDown") speed = 0.05;
});

document.addEventListener("keyup",()=>{
  steer = 0;
});

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  car.rotation.y += steer;

  car.position.x -= Math.sin(car.rotation.y) * speed;
  car.position.z -= Math.cos(car.rotation.y) * speed;

  camera.position.x = car.position.x + 6;
  camera.position.z = car.position.z + 8;
  camera.position.y = 5;

  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

animate();

// resize
window.addEventListener("resize",()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});
</script>

</body>
</html>
