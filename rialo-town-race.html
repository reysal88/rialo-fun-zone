<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIALO ULTRA LIGHT</title>

<style>
body { margin:0; overflow:hidden; background:#000; }

#controls{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  z-index:10;
}

.btn{
  width:65px;
  height:65px;
  background:#222;
  color:#fff;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="controls">
  <div class="btn" id="left">◀</div>
  <div class="btn" id="gas">▲</div>
  <div class="btn" id="right">▶</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ===== SCENE (ULTRA LIGHT) =====
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({
  antialias:false,
  powerPreference:"low-power"
});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT (SUPER SIMPLE) =====
scene.add(new THREE.AmbientLight(0xffffff, 1));

// ===== ROAD LOOP =====
const path = [
  new THREE.Vector3(0,0,0),
  new THREE.Vector3(-20,0,-40),
  new THREE.Vector3(20,0,-80),
  new THREE.Vector3(-20,0,-120),
  new THREE.Vector3(20,0,-160),
  new THREE.Vector3(0,0,-200),
  new THREE.Vector3(0,0,0)
];

function road(a,b){
  const dx=b.x-a.x;
  const dz=b.z-a.z;
  const dist=Math.sqrt(dx*dx+dz*dz);

  const r=new THREE.Mesh(
    new THREE.BoxGeometry(10,0.2,dist),
    new THREE.MeshBasicMaterial({color:0x333333})
  );

  r.position.set((a.x+b.x)/2,0,(a.z+b.z)/2);
  r.rotation.y=Math.atan2(dx,dz);
  scene.add(r);

  // markah sedikit aja
  for(let i=0;i<dist/6;i++){
    const t=i/(dist/6);
    const x=a.x+(b.x-a.x)*t;
    const z=a.z+(b.z-a.z)*t;

    const m=new THREE.Mesh(
      new THREE.BoxGeometry(0.2,0.05,1),
      new THREE.MeshBasicMaterial({color:0xffffff})
    );

    m.position.set(x,0.15,z);
    m.rotation.y=r.rotation.y;
    scene.add(m);
  }
}

for(let i=0;i<path.length-1;i++) road(path[i],path[i+1]);

// ===== BUILDINGS (ULTRA SIMPLE) =====
for(let i=0;i<20;i++){
  let x=(Math.random()-0.5)*120;
  let z=-Math.random()*200;

  if(Math.abs(x)>15){
    const b=new THREE.Mesh(
      new THREE.BoxGeometry(5,5+Math.random()*15,5),
      new THREE.MeshBasicMaterial({color:0x111133})
    );
    b.position.set(x,b.geometry.parameters.height/2,z);
    scene.add(b);
  }
}

// ===== FAKE LAMP (NO REAL LIGHT) =====
for(let i=0;i<15;i++){
  let z=-i*15;

  const lamp=new THREE.Mesh(
    new THREE.SphereGeometry(0.3),
    new THREE.MeshBasicMaterial({color:0xffffaa})
  );

  lamp.position.set(-7,4,z);
  scene.add(lamp);

  const lamp2=lamp.clone();
  lamp2.position.x=7;
  scene.add(lamp2);
}

// ===== CAR =====
const car=new THREE.Mesh(
  new THREE.BoxGeometry(1.5,0.7,3),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
car.position.set(0,1,0);
scene.add(car);

// ===== INPUT =====
let keys={left:false,right:false,gas:false};

addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") keys.left=true;
  if(e.key==="ArrowRight") keys.right=true;
  if(e.key==="ArrowUp") keys.gas=true;
});

addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft") keys.left=false;
  if(e.key==="ArrowRight") keys.right=false;
  if(e.key==="ArrowUp") keys.gas=false;
});

// mobile
function bind(id,key){
  const el=document.getElementById(id);
  el.ontouchstart=()=>keys[key]=true;
  el.ontouchend=()=>keys[key]=false;
}
bind("left","left");
bind("right","right");
bind("gas","gas");

// ===== DRIVING =====
let speed=0;

function updateCar(){
  if(keys.gas) speed+=0.04;

  speed*=0.97;

  if(speed>1.4) speed=1.4;

  if(keys.left) car.rotation.y+=0.04;
  if(keys.right) car.rotation.y-=0.04;

  car.position.x -= Math.sin(car.rotation.y)*speed;
  car.position.z -= Math.cos(car.rotation.y)*speed;
}

// ===== CAMERA =====
const offset=new THREE.Vector3(0,4,8);

function cam(){
  const m=new THREE.Matrix4();
  m.extractRotation(car.matrix);

  const behind=offset.clone().applyMatrix4(m);
  const pos=new THREE.Vector3().addVectors(car.position,behind);

  camera.position.lerp(pos,0.1);
  camera.lookAt(car.position);
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  updateCar();
  cam();

  renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
