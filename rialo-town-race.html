<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIALO RACING v5</title>

<style>
body { margin:0; overflow:hidden; background:#87CEEB; }
#ui{
  position:absolute;
  top:10px;
  left:10px;
  font-family:Arial;
  font-weight:bold;
  z-index:10;
}
</style>
</head>

<body>
<div id="ui">RIALO RACING v5 (CAMERA + HANDLING)</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================
// BASIC SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10,20,10);
scene.add(sun);

// =====================
// CAR
// =====================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.6,0.8,3),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
car.position.set(0,1,0);
scene.add(car);

// =====================
// PHYSICS (FIXED HANDLING)
// =====================
let speed = 0;
let maxSpeed = 1.5;
let accel = 0.02;
let brake = 0.03;
let friction = 0.97;
let turn = 0;

// =====================
// INPUT
// =====================
let keys = {
  up:false,
  down:false,
  left:false,
  right:false
};

addEventListener("keydown",(e)=>{
  if(e.key==="ArrowUp") keys.up=true;
  if(e.key==="ArrowDown") keys.down=true;
  if(e.key==="ArrowLeft") keys.left=true;
  if(e.key==="ArrowRight") keys.right=true;
});

addEventListener("keyup",(e)=>{
  if(e.key==="ArrowUp") keys.up=false;
  if(e.key==="ArrowDown") keys.down=false;
  if(e.key==="ArrowLeft") keys.left=false;
  if(e.key==="ArrowRight") keys.right=false;
});

// =====================
// UPDATE LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  // ===== ENGINE =====
  if(keys.up){
    speed += accel;
  }
  if(keys.down){
    speed -= brake;
  }

  // friction
  speed *= friction;

  // clamp
  if(speed > maxSpeed) speed = maxSpeed;
  if(speed < -0.5) speed = -0.5;

  // ===== STEERING (lebih realistis: ikut speed) =====
  let steerStrength = 0.03;
  if(Math.abs(speed) > 0.1){
    if(keys.left) car.rotation.y += steerStrength;
    if(keys.right) car.rotation.y -= steerStrength;
  }

  // ===== MOVE CAR =====
  car.position.x -= Math.sin(car.rotation.y) * speed;
  car.position.z -= Math.cos(car.rotation.y) * speed;

  // =====================
  // CAMERA CHASE FIX (INI KUNCI)
  // =====================
  const offset = new THREE.Vector3(0, 5, 10);

  const rotMatrix = new THREE.Matrix4();
  rotMatrix.extractRotation(car.matrix);

  const behind = offset.clone().applyMatrix4(rotMatrix);

  const desiredPos = new THREE.Vector3().addVectors(car.position, behind);

  camera.position.lerp(desiredPos, 0.08);
  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

animate();

// resize
addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
