<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Tokyo Arcade Racing</title>

<style>
body { margin:0; overflow:hidden; background:#000; }

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:#00ffff;
  font-family:Arial;
  font-size:14px;
  z-index:10;
}

#finish{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  color:yellow;
  font-size:40px;
  font-family:Arial;
  display:none;
}
</style>
</head>

<body>
<div id="ui">ARCADE RACING - Reach FINISH</div>
<div id="finish">FINISH!</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================
// BASIC SETUP
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 20, 200);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0x333333));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// =====================
// TRACK (CURVE PATH - FIXED ROUTE)
// =====================
const path = [];
let z = 0;
let x = 0;

// bikin track belok (arc sederhana)
for(let i=0;i<200;i++){
  z -= 5;

  if(i < 50) x += 0.1;
  else if(i < 100) x -= 0.15;
  else if(i < 150) x += 0.05;
  else x -= 0.08;

  path.push({x,z});
}

// road segments
for(let i=0;i<path.length;i++){
  const seg = new THREE.Mesh(
    new THREE.PlaneGeometry(10,5),
    new THREE.MeshStandardMaterial({color:0x111111})
  );

  seg.rotation.x = -Math.PI/2;
  seg.position.set(path[i].x,0,path[i].z);
  scene.add(seg);
}

// =====================
// CITY (BETTER STRUCTURE)
// =====================
function building(x,z,h,color){
  const b = new THREE.Mesh(
    new THREE.BoxGeometry(6,h,6),
    new THREE.MeshStandardMaterial({
      color:0x111111,
      emissive:color,
      emissiveIntensity:0.3
    })
  );
  b.position.set(x,h/2,z);
  scene.add(b);
}

for(let i=0;i<path.length;i+=5){
  const p = path[i];

  building(p.x + 12, p.z, 20 + (i%4)*5, 0x00ffff);
  building(p.x - 12, p.z, 25 + (i%6)*4, 0xff00ff);
}

// =====================
// CAR
// =====================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.6,0.8,3),
  new THREE.MeshStandardMaterial({
    color:0xff0000,
    emissive:0xff0000,
    emissiveIntensity:0.4
  })
);

scene.add(car);
car.position.set(path[0].x,1,path[0].z);

// =====================
// GAME STATE
// =====================
let index = 0;
let speed = 0.6;
let steer = 0;

let finished = false;

// controls
addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") steer = 0.1;
  if(e.key==="ArrowRight") steer = -0.1;
  if(e.key==="ArrowUp") speed = 1;
  if(e.key==="ArrowDown") speed = 0.2;
});

addEventListener("keyup",()=>steer=0);

// =====================
// CAMERA (PS2 STYLE CHASE)
// =====================
const camOffset = new THREE.Vector3(0,6,12);

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  if(finished) return;

  index += speed;
  if(index >= path.length){
    document.getElementById("finish").style.display="block";
    finished = true;
    return;
  }

  const target = path[Math.floor(index)];
  const next = path[Math.floor(index)+1] || target;

  // direction follow track
  car.position.x = target.x;
  car.position.z = target.z;

  const dx = next.x - target.x;
  const dz = next.z - target.z;

  car.rotation.y = Math.atan2(dx, dz);

  // camera follow (SMOOTH)
  camera.position.x += (car.position.x + camOffset.x - camera.position.x)*0.08;
  camera.position.z += (car.position.z + camOffset.z - camera.position.z)*0.08;
  camera.position.y = camOffset.y;

  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

animate();

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
