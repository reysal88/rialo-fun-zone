<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;overflow:hidden;background:#000;}
#controls{
 position:fixed;bottom:20px;width:100%;
 display:flex;justify-content:center;gap:10px;
}
.btn{
 width:70px;height:70px;
 background:#222;color:#fff;
 display:flex;align-items:center;justify-content:center;
 border-radius:12px;
}
</style>
</head>
<body>

<div id="controls">
<div class="btn" id="left">◀</div>
<div class="btn" id="gas">▲</div>
<div class="btn" id="right">▶</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a1a);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== GROUND BESAR =====
const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(1000,1000),
 new THREE.MeshBasicMaterial({color:0x111111})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== JALAN = PLANE (INI KUNCI) =====
const road=new THREE.Mesh(
 new THREE.PlaneGeometry(20,400),
 new THREE.MeshBasicMaterial({color:0x444444})
);
road.rotation.x=-Math.PI/2;
road.position.z=-150;
scene.add(road);

// ===== GARIS JALAN =====
for(let i=0;i<50;i++){
 const line=new THREE.Mesh(
   new THREE.BoxGeometry(0.4,0.05,3),
   new THREE.MeshBasicMaterial({color:0xffffff})
 );
 line.position.set(0,0.1,-i*8);
 scene.add(line);
}

// ===== BELOKAN KOTA (PLANE LAGI) =====
const turn=new THREE.Mesh(
 new THREE.PlaneGeometry(20,200),
 new THREE.MeshBasicMaterial({color:0x444444})
);
turn.rotation.x=-Math.PI/2;
turn.rotation.z=Math.PI/2;
turn.position.set(100,0,-300);
scene.add(turn);

// ===== MOBIL =====
const car=new THREE.Mesh(
 new THREE.BoxGeometry(2,1,4),
 new THREE.MeshBasicMaterial({color:0xff0000})
);
car.position.set(0,1,10);
scene.add(car);

// ===== INPUT =====
let keys={};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

function bind(id,key){
 const el=document.getElementById(id);
 el.ontouchstart=()=>keys[key]=true;
 el.ontouchend=()=>keys[key]=false;
}
bind("left","ArrowLeft");
bind("right","ArrowRight");
bind("gas","ArrowUp");

// ===== DRIVE =====
let speed=0;

function update(){
 if(keys["ArrowUp"]) speed+=0.05;
 speed*=0.96;

 if(keys["ArrowLeft"]) car.rotation.y+=0.04;
 if(keys["ArrowRight"]) car.rotation.y-=0.04;

 car.position.x -= Math.sin(car.rotation.y)*speed;
 car.position.z -= Math.cos(car.rotation.y)*speed;
}

// ===== CAMERA (LOW BACK VIEW) =====
const offset=new THREE.Vector3(0,2,6);

function cam(){
 const m=new THREE.Matrix4();
 m.extractRotation(car.matrix);

 const pos=offset.clone().applyMatrix4(m).add(car.position);
 camera.position.lerp(pos,0.15);
 camera.lookAt(car.position);
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 update();
 cam();

 renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
