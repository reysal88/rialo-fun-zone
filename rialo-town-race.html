<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIALO 3D RACE</title>

<style>
body { margin:0; overflow:hidden; background:#000; }

#ui {
  position:absolute;
  top:10px;
  left:10px;
  color:#00ffff;
  font-family:Arial;
  z-index:10;
}

#startBtn {
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:12px 20px;
  background:#ff0033;
  color:white;
  border:none;
  font-size:16px;
  border-radius:10px;
  z-index:10;
}

#controls {
  position:absolute;
  bottom:20px;
  left:20px;
  display:flex;
  gap:10px;
  z-index:10;
}

.btn {
  width:60px;
  height:60px;
  background:#222;
  color:white;
  font-size:20px;
  border-radius:12px;
  display:flex;
  align-items:center;
  justify-content:center;
  user-select:none;
}
</style>
</head>

<body>

<div id="ui">RIALO 3D RACE - START WAITING</div>
<button id="startBtn">START RACE</button>

<div id="controls">
  <div class="btn" id="left">◀</div>
  <div class="btn" id="right">▶</div>
  <div class="btn" id="gas">▲</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================
// SETUP
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 20, 200);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0x444444));
const dir = new THREE.DirectionalLight(0xffffff, 1);
dir.position.set(5,10,7);
scene.add(dir);

// =====================
// ROAD
// =====================
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(12, 500),
  new THREE.MeshStandardMaterial({color:0x111111})
);
road.rotation.x = -Math.PI/2;
road.position.z = -200;
scene.add(road);

// =====================
// ROAD MARKINGS
// =====================

// center line dashed
for(let i=0;i<100;i++){
  const line = new THREE.Mesh(
    new THREE.BoxGeometry(0.2,0.01,2),
    new THREE.MeshBasicMaterial({color:0xffffff})
  );
  line.position.set(0,0.01,-i*5);
  scene.add(line);
}

// side lines
function sideLine(x){
  for(let i=0;i<100;i++){
    const line = new THREE.Mesh(
      new THREE.BoxGeometry(0.2,0.01,2),
      new THREE.MeshBasicMaterial({color:0xffff00})
    );
    line.position.set(x,0.01,-i*5);
    scene.add(line);
  }
}
sideLine(-6);
sideLine(6);

// =====================
// CAR
// =====================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.5,0.8,3),
  new THREE.MeshStandardMaterial({color:0xff0033})
);
car.position.set(0,1,0);
scene.add(car);

// =====================
// TRAFFIC LIGHT START
// =====================
const pole = new THREE.Mesh(
  new THREE.BoxGeometry(0.2,6,0.2),
  new THREE.MeshStandardMaterial({color:0x555555})
);
pole.position.set(0,3,-10);
scene.add(pole);

const red = new THREE.Mesh(
  new THREE.SphereGeometry(0.4),
  new THREE.MeshBasicMaterial({color:0x330000})
);
red.position.set(0,5,-10);
scene.add(red);

const yellow = red.clone();
yellow.position.y = 4;
scene.add(yellow);

const green = red.clone();
green.position.y = 3;
scene.add(green);

// =====================
// CAMERA CHASE
// =====================
const offset = new THREE.Vector3(0,5,10);

// =====================
// CONTROL
// =====================
let steer = 0;
let speed = 0;

function moveLeft(){ steer = 0.08; }
function moveRight(){ steer = -0.08; }
function gas(){ speed = 0.5; }

function stopSteer(){ steer = 0; }

document.getElementById("left").ontouchstart = moveLeft;
document.getElementById("right").ontouchstart = moveRight;
document.getElementById("gas").ontouchstart = gas;

document.getElementById("left").ontouchend = stopSteer;
document.getElementById("right").ontouchend = stopSteer;
document.getElementById("gas").ontouchend = ()=>speed=0;

addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") steer=0.08;
  if(e.key==="ArrowRight") steer=-0.08;
  if(e.key==="ArrowUp") speed=0.5;
});
addEventListener("keyup",()=>{steer=0; speed=0;});

// =====================
// START LIGHT LOGIC
// =====================
let raceStarted = false;

function startSequence(){
  document.getElementById("ui").innerText = "READY...";

  red.material.color.set(0xff0000);

  setTimeout(()=>yellow.material.color.set(0xffff00),1000);
  setTimeout(()=>yellow.material.color.set(0x222200),2000);
  setTimeout(()=>{
    green.material.color.set(0x00ff00);
    raceStarted = true;
    document.getElementById("ui").innerText = "GO!";
  },3000);
}

document.getElementById("startBtn").onclick = startSequence;

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  if(raceStarted){
    car.rotation.y += steer;

    car.position.x -= Math.sin(car.rotation.y)*speed;
    car.position.z -= Math.cos(car.rotation.y)*speed;
  }

  camera.position.x += (car.position.x + offset.x - camera.position.x)*0.1;
  camera.position.y = offset.y;
  camera.position.z += (car.position.z + offset.z - camera.position.z)*0.1;

  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

animate();

// resize
addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
