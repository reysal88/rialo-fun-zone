<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIALO CITY RACE</title>

<style>
body { margin:0; overflow:hidden; background:#000; }

#controls{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
  z-index:10;
}

.btn{
  width:70px;
  height:70px;
  background:#222;
  color:#fff;
  font-size:24px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
}
</style>
</head>

<body>

<div id="controls">
  <div class="btn" id="left">◀</div>
  <div class="btn" id="gas">▲</div>
  <div class="btn" id="right">▶</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ================= SCENE =================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 20, 200);

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ================= LIGHT =================
scene.add(new THREE.AmbientLight(0x555555));

const neonLight = new THREE.DirectionalLight(0x88aaff,1);
neonLight.position.set(10,20,10);
scene.add(neonLight);

// ================= ROAD =================
const path = [
  new THREE.Vector3(0,0,0),
  new THREE.Vector3(-20,0,-40),
  new THREE.Vector3(20,0,-80),
  new THREE.Vector3(-20,0,-120),
  new THREE.Vector3(20,0,-160),
  new THREE.Vector3(0,0,-200),
  new THREE.Vector3(0,0,0)
];

function buildRoad(a,b){
  const dx = b.x-a.x;
  const dz = b.z-a.z;
  const dist = Math.sqrt(dx*dx+dz*dz);

  const road = new THREE.Mesh(
    new THREE.BoxGeometry(12,0.2,dist),
    new THREE.MeshStandardMaterial({color:0x222222})
  );

  road.position.set((a.x+b.x)/2,0,(a.z+b.z)/2);
  road.rotation.y = Math.atan2(dx,dz);
  scene.add(road);

  for(let i=0;i<dist/3;i++){
    const t = i/(dist/3);
    const x = a.x+(b.x-a.x)*t;
    const z = a.z+(b.z-a.z)*t;

    const mark = new THREE.Mesh(
      new THREE.BoxGeometry(0.3,0.05,1),
      new THREE.MeshBasicMaterial({color:0xffffff})
    );

    mark.position.set(x,0.15,z);
    mark.rotation.y = road.rotation.y;
    scene.add(mark);
  }
}

for(let i=0;i<path.length-1;i++){
  buildRoad(path[i],path[i+1]);
}

// ================= BUILDINGS =================
function createBuilding(x,z){
  const h = 10 + Math.random()*40;

  const b = new THREE.Mesh(
    new THREE.BoxGeometry(6,h,6),
    new THREE.MeshStandardMaterial({
      color:0x111133,
      emissive:0x2222ff,
      emissiveIntensity:0.5,
      metalness:0.8,
      roughness:0.2
    })
  );

  b.position.set(x,h/2,z);
  scene.add(b);
}

// sebar gedung
for(let i=0;i<80;i++){
  let x = (Math.random()-0.5)*150;
  let z = -Math.random()*250;

  if(Math.abs(x)>15){
    createBuilding(x,z);
  }
}

// ================= LAMP =================
function createLamp(x,z){

  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1,0.1,5),
    new THREE.MeshStandardMaterial({color:0x888888})
  );

  pole.position.set(x,2.5,z);
  scene.add(pole);

  const light = new THREE.PointLight(0xffffaa,1,20);
  light.position.set(x,5,z);
  scene.add(light);
}

for(let i=0;i<25;i++){
  createLamp(-8,-i*10);
  createLamp(8,-i*10);
}

// ================= SIGN =================
function createSign(x,z){

  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.1,0.1,3),
    new THREE.MeshStandardMaterial({color:0xffffff})
  );

  pole.position.set(x,1.5,z);
  scene.add(pole);

  const sign = new THREE.Mesh(
    new THREE.BoxGeometry(2,1,0.2),
    new THREE.MeshBasicMaterial({color:0xff0000})
  );

  sign.position.set(x,3,z);
  scene.add(sign);
}

createSign(-15,-40);
createSign(15,-80);
createSign(-15,-120);

// ================= CAR =================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.6,0.8,3),
  new THREE.MeshStandardMaterial({color:0xff0000})
);
car.position.set(0,1,0);
scene.add(car);

// ================= INPUT =================
let keys={left:false,right:false,gas:false};

addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") keys.left=true;
  if(e.key==="ArrowRight") keys.right=true;
  if(e.key==="ArrowUp") keys.gas=true;
});

addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft") keys.left=false;
  if(e.key==="ArrowRight") keys.right=false;
  if(e.key==="ArrowUp") keys.gas=false;
});

// mobile
function bind(id,key){
  const el=document.getElementById(id);
  el.ontouchstart=()=>keys[key]=true;
  el.ontouchend=()=>keys[key]=false;
}
bind("left","left");
bind("right","right");
bind("gas","gas");

// ================= DRIVING =================
let speed=0;

function updateCar(){
  if(keys.gas) speed+=0.03;
  speed*=0.97;
  if(speed>1.3) speed=1.3;

  if(keys.left) car.rotation.y+=0.04;
  if(keys.right) car.rotation.y-=0.04;

  car.position.x -= Math.sin(car.rotation.y)*speed;
  car.position.z -= Math.cos(car.rotation.y)*speed;
}

// ================= CAMERA =================
const offset=new THREE.Vector3(0,5,10);

function updateCamera(){
  const m=new THREE.Matrix4();
  m.extractRotation(car.matrix);

  const behind=offset.clone().applyMatrix4(m);
  const pos=new THREE.Vector3().addVectors(car.position,behind);

  camera.position.lerp(pos,0.1);
  camera.lookAt(car.position);
}

// ================= LOOP =================
function animate(){
  requestAnimationFrame(animate);

  updateCar();
  updateCamera();

  renderer.render(scene,camera);
}
animate();

addEventListener("resize",()=>{
  camera.aspect=innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
