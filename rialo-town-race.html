<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RIALO LOOP ROAD v3</title>
<style>
body { margin:0; overflow:hidden; background:#87CEEB; }
</style>
</head>

<body>
<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================
// BASIC SCENE
// =====================
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,15,20);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT (biar tidak gelap)
scene.add(new THREE.AmbientLight(0xffffff, 0.8));
const sun = new THREE.DirectionalLight(0xffffff, 1);
sun.position.set(10,20,10);
scene.add(sun);

// =====================
// LOOP ROAD PATH (CIRCUIT)
// =====================
const path = [
  new THREE.Vector3(0,0,0),
  new THREE.Vector3(-20,0,-40),
  new THREE.Vector3(20,0,-80),
  new THREE.Vector3(-20,0,-120),
  new THREE.Vector3(20,0,-160),
  new THREE.Vector3(0,0,-200),
  new THREE.Vector3(0,0,0) // BACK TO START (LOOP)
];

// =====================
// ROAD BUILDER (SMOOTH SEGMENT)
// =====================
function buildRoad(a,b){

  const dx = b.x - a.x;
  const dz = b.z - a.z;

  const dist = Math.sqrt(dx*dx + dz*dz);

  const road = new THREE.Mesh(
    new THREE.BoxGeometry(10,0.2,dist),
    new THREE.MeshStandardMaterial({color:0x2b2b2b})
  );

  road.position.set(
    (a.x + b.x)/2,
    0,
    (a.z + b.z)/2
  );

  road.rotation.y = Math.atan2(dx, dz);

  scene.add(road);

  // =====================
  // MARKAH JALAN (PUTIH)
  // =====================
  const marks = Math.floor(dist / 2);

  for(let i=0;i<marks;i++){

    const t = i / marks;

    const x = a.x + (b.x - a.x) * t;
    const z = a.z + (b.z - a.z) * t;

    const mark = new THREE.Mesh(
      new THREE.BoxGeometry(0.3,0.05,1),
      new THREE.MeshBasicMaterial({color:0xffffff})
    );

    mark.position.set(x,0.2,z);

    mark.rotation.y = road.rotation.y;

    scene.add(mark);
  }
}

// =====================
// BUILD FULL CIRCUIT ROAD
// =====================
for(let i=0;i<path.length-1;i++){
  buildRoad(path[i], path[i+1]);
}

// =====================
// SIMPLE CAR (VIEW TEST)
// =====================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.5,0.8,3),
  new THREE.MeshStandardMaterial({color:0xff0000})
);

car.position.set(0,1,0);
scene.add(car);

// =====================
// MOVE ALONG LOOP (TEST RACE FLOW)
// =====================
let index = 0;
let t = 0;
let speed = 0.002;

function animate(){
  requestAnimationFrame(animate);

  const a = path[index];
  const b = path[index+1];

  t += speed;

  if(t >= 1){
    t = 0;
    index++;

    if(index >= path.length-1){
      index = 0; // LOOP BACK START
    }
  }

  car.position.x = a.x + (b.x - a.x) * t;
  car.position.z = a.z + (b.z - a.z) * t;

  camera.position.x += (car.position.x - camera.position.x)*0.08;
  camera.position.z += (car.position.z + 15 - camera.position.z)*0.08;
  camera.position.y = 12;

  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

animate();

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
