<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;overflow:hidden;}
#controls{
 position:fixed;bottom:20px;width:100%;
 display:flex;justify-content:center;gap:10px;
}
.btn{
 width:65px;height:65px;
 background:#333;color:#fff;
 display:flex;align-items:center;justify-content:center;
 border-radius:10px;
}
</style>
</head>
<body>

<div id="controls">
<div class="btn" id="left">◀</div>
<div class="btn" id="gas">▲</div>
<div class="btn" id="right">▶</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ===== SCENE =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x87ceeb); // langit biru

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== GROUND =====
const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(1000,1000),
 new THREE.MeshBasicMaterial({color:0x228B22})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== GUNUNG (SIMPLE) =====
for(let i=0;i<20;i++){
 const mountain=new THREE.Mesh(
   new THREE.ConeGeometry(30,80,4),
   new THREE.MeshBasicMaterial({color:0x556B2F})
 );
 mountain.position.set(
   (Math.random()-0.5)*800,
   40,
   -200 - Math.random()*600
 );
 scene.add(mountain);
}

// ===== JALAN LURUS PANJANG =====
const road=new THREE.Mesh(
 new THREE.PlaneGeometry(20,800),
 new THREE.MeshBasicMaterial({color:0x555555})
);
road.rotation.x=-Math.PI/2;
road.position.z=-300;
scene.add(road);

// ===== GARIS JALAN =====
for(let i=0;i<80;i++){
 const line=new THREE.Mesh(
   new THREE.BoxGeometry(0.5,0.1,3),
   new THREE.MeshBasicMaterial({color:0xffffff})
 );
 line.position.set(0,0.2,-i*10);
 scene.add(line);
}

// ===== MOBIL =====
const car=new THREE.Mesh(
 new THREE.BoxGeometry(2,1,4),
 new THREE.MeshBasicMaterial({color:0xff0000})
);
car.position.set(0,1,10);
scene.add(car);

// ===== INPUT =====
let keys={};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

function bind(id,key){
 const el=document.getElementById(id);
 el.ontouchstart=()=>keys[key]=true;
 el.ontouchend=()=>keys[key]=false;
}
bind("left","ArrowLeft");
bind("right","ArrowRight");
bind("gas","ArrowUp");

// ===== DRIVE =====
let speed=0;

function update(){
 if(keys["ArrowUp"]) speed+=0.05;
 speed*=0.97;

 if(keys["ArrowLeft"]) car.position.x-=0.3;
 if(keys["ArrowRight"]) car.position.x+=0.3;

 // maju terus
 car.position.z-=speed;
}

// ===== CAMERA =====
const offset=new THREE.Vector3(0,3,8);

function cam(){
 const target=car.position.clone().add(offset);
 camera.position.lerp(target,0.1);
 camera.lookAt(car.position);
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 update();
 cam();

 renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
