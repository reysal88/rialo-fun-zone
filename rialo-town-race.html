<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;overflow:hidden;background:#000;}
#ui{position:absolute;top:10px;left:10px;color:#fff;font-family:Arial;}
#controls{position:fixed;bottom:20px;width:100%;display:flex;justify-content:center;gap:10px;}
.btn{width:65px;height:65px;background:#222;color:#fff;display:flex;align-items:center;justify-content:center;border-radius:10px;}
</style>
</head>
<body>

<div id="ui">Lap: 1 / 5</div>

<div id="controls">
<div class="btn" id="left">◀</div>
<div class="btn" id="gas">▲</div>
<div class="btn" id="right">▶</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

const scene=new THREE.Scene();
const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer({antialias:false});
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== TRACK HALUS (INI YANG BENER) =====
const curve=new THREE.CatmullRomCurve3([
  new THREE.Vector3(0,0,0),
  new THREE.Vector3(0,0,-80),
  new THREE.Vector3(60,0,-120),
  new THREE.Vector3(60,0,-200),
  new THREE.Vector3(0,0,-260),
  new THREE.Vector3(-60,0,-200),
  new THREE.Vector3(-60,0,-120),
  new THREE.Vector3(0,0,-80),
  new THREE.Vector3(0,0,0)
],true);

// ===== ROAD SMOOTH =====
const pts=curve.getPoints(300);

for(let i=0;i<pts.length-1;i++){
  const a=pts[i],b=pts[i+1];

  const dx=b.x-a.x;
  const dz=b.z-a.z;
  const dist=Math.sqrt(dx*dx+dz*dz);

  const mesh=new THREE.Mesh(
    new THREE.BoxGeometry(12,0.2,dist),
    new THREE.MeshBasicMaterial({color:0x333333})
  );

  mesh.position.set((a.x+b.x)/2,0,(a.z+b.z)/2);
  mesh.rotation.y=Math.atan2(dx,dz);
  scene.add(mesh);
}

// ===== START LINE =====
const startLine=new THREE.Mesh(
  new THREE.BoxGeometry(12,0.1,4),
  new THREE.MeshBasicMaterial({color:0xffffff})
);
startLine.position.set(0,0.2,0);
scene.add(startLine);

// ===== CHECKPOINT (DI TIKUNGAN) =====
const checkpoints=[
  new THREE.Vector3(0,0,-80),
  new THREE.Vector3(60,0,-160),
  new THREE.Vector3(0,0,-260),
  new THREE.Vector3(-60,0,-160)
];

let cpIndex=0,lap=1,prevZ=5;

// visual checkpoint
checkpoints.forEach(p=>{
  const ring=new THREE.Mesh(
    new THREE.TorusGeometry(4,0.2,8,16),
    new THREE.MeshBasicMaterial({color:0x00ff00})
  );
  ring.position.copy(p);
  ring.rotation.x=Math.PI/2;
  scene.add(ring);
});

// ===== CAR =====
const car=new THREE.Mesh(
  new THREE.BoxGeometry(1.5,0.7,3),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
car.position.set(0,1,5);
scene.add(car);

// ===== INPUT =====
let keys={};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

function bind(id,key){
  const el=document.getElementById(id);
  el.ontouchstart=()=>keys[key]=true;
  el.ontouchend=()=>keys[key]=false;
}
bind("left","ArrowLeft");
bind("right","ArrowRight");
bind("gas","ArrowUp");

// ===== DRIVE =====
let speed=0;

function updateCar(){
  if(keys["ArrowUp"]) speed+=0.04;
  speed*=0.97;
  if(speed>1.5) speed=1.5;

  if(keys["ArrowLeft"]) car.rotation.y+=0.04;
  if(keys["ArrowRight"]) car.rotation.y-=0.04;

  car.position.x-=Math.sin(car.rotation.y)*speed;
  car.position.z-=Math.cos(car.rotation.y)*speed;
}

// ===== RACE SYSTEM (BERSIH) =====
function checkRace(){

  // checkpoint harus urut
  if(car.position.distanceTo(checkpoints[cpIndex])<10){
    cpIndex++;
  }

  // kalau semua checkpoint sudah lewat
  if(cpIndex>=checkpoints.length){

    // crossing start line
    if(prevZ>0 && car.position.z<=0){

      lap++;
      cpIndex=0;

      if(lap>5){
        alert("FINISH!");
        lap=1;
      }

      document.getElementById("ui").innerText="Lap: "+lap+" / 5";
    }
  }

  prevZ=car.position.z;
}

// ===== CAMERA =====
const offset=new THREE.Vector3(0,5,10);

function cam(){
  const m=new THREE.Matrix4();
  m.extractRotation(car.matrix);

  const pos=offset.clone().applyMatrix4(m).add(car.position);
  camera.position.lerp(pos,0.1);
  camera.lookAt(car.position);
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  updateCar();
  checkRace();
  cam();

  renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
