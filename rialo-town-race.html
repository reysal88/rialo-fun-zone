<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;overflow:hidden;background:#000;font-family:Arial}
#ui{
 position:absolute;top:10px;left:10px;
 color:#fff;font-size:18px
}
#controls{
 position:fixed;bottom:20px;width:100%;
 display:flex;justify-content:center;gap:10px;
}
.btn{
 width:65px;height:65px;
 background:#222;color:#fff;
 display:flex;align-items:center;justify-content:center;
 border-radius:10px;
}
</style>
</head>
<body>

<div id="ui">Lap: 1 / 3</div>

<div id="controls">
<div class="btn" id="left">◀</div>
<div class="btn" id="gas">▲</div>
<div class="btn" id="right">▶</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
<script>

// ===== SCENE =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x0a0a1a);

const camera=new THREE.PerspectiveCamera(70,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== GROUND =====
const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(600,600),
 new THREE.MeshBasicMaterial({color:0x111111})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== TRACK PATH (LOOP KOTA) =====
const path=new THREE.CatmullRomCurve3([
 new THREE.Vector3(-60,0,60),
 new THREE.Vector3(60,0,60),
 new THREE.Vector3(100,0,20),
 new THREE.Vector3(100,0,-100),
 new THREE.Vector3(60,0,-140),
 new THREE.Vector3(-60,0,-140),
 new THREE.Vector3(-100,0,-100),
 new THREE.Vector3(-100,0,20),
 new THREE.Vector3(-60,0,60)
], true);

// ===== ROAD (HALUS & NYAMBUNG) =====
const roadGeo=new THREE.TubeGeometry(path,300,8,12,true);
const roadMat=new THREE.MeshBasicMaterial({color:0x444444});
const road=new THREE.Mesh(roadGeo,roadMat);
scene.add(road);

// ===== GARIS TENGAH =====
const pts=path.getPoints(300);
for(let i=0;i<pts.length;i+=10){
 const mark=new THREE.Mesh(
   new THREE.BoxGeometry(0.4,0.1,2),
   new THREE.MeshBasicMaterial({color:0xffffff})
 );
 mark.position.copy(pts[i]);
 mark.position.y=0.5;
 scene.add(mark);
}

// ===== START / FINISH =====
const startLine=new THREE.Mesh(
 new THREE.BoxGeometry(16,0.2,4),
 new THREE.MeshBasicMaterial({color:0xffffff})
);
startLine.position.set(-60,0.3,60);
scene.add(startLine);

// ===== CAR =====
const car=new THREE.Mesh(
 new THREE.BoxGeometry(2,1,4),
 new THREE.MeshBasicMaterial({color:0xff0000})
);
scene.add(car);

// ===== INPUT =====
let keys={};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

function bind(id,key){
 const el=document.getElementById(id);
 el.ontouchstart=()=>keys[key]=true;
 el.ontouchend=()=>keys[key]=false;
}
bind("left","ArrowLeft");
bind("right","ArrowRight");
bind("gas","ArrowUp");

// ===== DRIVING =====
let t=0;
let speed=0;

function updateCar(){

 if(keys["ArrowUp"]) speed+=0.002;
 speed*=0.98;

 if(keys["ArrowLeft"]) t-=0.003;
 if(keys["ArrowRight"]) t+=0.003;

 t+=speed;

 if(t>1) t-=1;
 if(t<0) t+=1;

 const pos=path.getPointAt(t);
 const next=path.getPointAt((t+0.01)%1);

 car.position.copy(pos);

 const dir=new THREE.Vector3().subVectors(next,pos);
 car.rotation.y=Math.atan2(-dir.x,-dir.z);
}

// ===== LAP SYSTEM =====
let lap=1;
let lastT=0;

function updateLap(){
 if(lastT>0.9 && t<0.1){
   lap++;
   if(lap>3){
     alert("FINISH!");
     lap=1;
   }
   document.getElementById("ui").innerText="Lap: "+lap+" / 3";
 }
 lastT=t;
}

// ===== CAMERA =====
const offset=new THREE.Vector3(0,3,8);

function cam(){
 const m=new THREE.Matrix4();
 m.extractRotation(car.matrix);

 const pos=offset.clone().applyMatrix4(m).add(car.position);
 camera.position.lerp(pos,0.1);
 camera.lookAt(car.position);
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 updateCar();
 updateLap();
 cam();

 renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
