<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIALO RACING CORE v1</title>

<style>
body { margin:0; overflow:hidden; background:#000; }

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:#00ffff;
  font-family:Arial;
  z-index:10;
}

#ctrl{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  display:flex;
  gap:10px;
  z-index:10;
}

.btn{
  width:70px;
  height:70px;
  background:#222;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:12px;
  user-select:none;
}
</style>
</head>

<body>

<div id="ui">RIALO CORE v1 (PHYSICS FIX)</div>

<div id="ctrl">
  <div class="btn" id="left">◀</div>
  <div class="btn" id="gas">▲</div>
  <div class="btn" id="right">▶</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ======================
// SETUP
// ======================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 50, 200);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0x555555));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// ======================
// CAR
// ======================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.6,0.8,3),
  new THREE.MeshStandardMaterial({color:0xff0033})
);
car.position.set(0,1,0);
scene.add(car);

// ======================
// PHYSICS (INI FIX UTAMA)
// ======================
let speed = 0;
let maxSpeed = 1.2;
let accel = 0.02;
let friction = 0.98;
let steer = 0;

// ======================
// CONTROLS
// ======================
let keys = {
  left:false,
  right:false,
  gas:false
};

addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") keys.left=true;
  if(e.key==="ArrowRight") keys.right=true;
  if(e.key==="ArrowUp") keys.gas=true;
});

addEventListener("keyup",(e)=>{
  if(e.key==="ArrowLeft") keys.left=false;
  if(e.key==="ArrowRight") keys.right=false;
  if(e.key==="ArrowUp") keys.gas=false;
});

// mobile
document.getElementById("left").ontouchstart=()=>keys.left=true;
document.getElementById("left").ontouchend=()=>keys.left=false;

document.getElementById("right").ontouchstart=()=>keys.right=true;
document.getElementById("right").ontouchend=()=>keys.right=false;

document.getElementById("gas").ontouchstart=()=>keys.gas=true;
document.getElementById("gas").ontouchend=()=>keys.gas=false;

// ======================
// UPDATE LOOP
// ======================
function animate(){
  requestAnimationFrame(animate);

  // ===== ENGINE =====
  if(keys.gas){
    speed += accel;
  } else {
    speed *= friction;
  }

  // clamp speed
  if(speed > maxSpeed) speed = maxSpeed;
  if(speed < 0) speed = 0;

  // ===== STEERING =====
  if(keys.left) car.rotation.y += 0.04;
  if(keys.right) car.rotation.y -= 0.04;

  // ===== MOVE CAR (REAL MOVEMENT) =====
  car.position.x -= Math.sin(car.rotation.y) * speed;
  car.position.z -= Math.cos(car.rotation.y) * speed;

  // ===== CAMERA FOLLOW =====
  const camOffset = new THREE.Vector3(0,5,10);

  const camPos = new THREE.Vector3(
    car.position.x + camOffset.x,
    car.position.y + camOffset.y,
    car.position.z + camOffset.z
  );

  camera.position.lerp(camPos, 0.08);
  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

animate();

// resize
addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
