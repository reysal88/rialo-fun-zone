<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIALO CIRCUIT RACE v2</title>

<style>
body { margin:0; overflow:hidden; background:#000; }

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:#00ffff;
  font-family:Arial;
  z-index:10;
}

#btn{
  position:absolute;
  bottom:20px;
  left:50%;
  transform:translateX(-50%);
  padding:10px 20px;
  background:#ff0033;
  color:#fff;
  border:none;
  border-radius:10px;
  font-size:16px;
  z-index:10;
}

#ctrl{
  position:absolute;
  bottom:20px;
  left:20px;
  display:flex;
  gap:10px;
  z-index:10;
}

.cbtn{
  width:55px;
  height:55px;
  background:#222;
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  user-select:none;
}
</style>
</head>

<body>

<div id="ui">RIALO CIRCUIT v2</div>
<button id="btn">START RACE</button>

<div id="ctrl">
  <div class="cbtn" id="left">◀</div>
  <div class="cbtn" id="right">▶</div>
  <div class="cbtn" id="gas">▲</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================
// BASIC SETUP
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 30, 200);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0x555555));
const dir = new THREE.DirectionalLight(0xffffff, 1);
dir.position.set(10,20,10);
scene.add(dir);

// =====================
// TRACK (4 TIKUNGAN CIRCUIT)
// =====================
const path = [
  {x:0, z:0},      // START
  {x:-15, z:-60},  // turn 1 kiri
  {x:15, z:-120},  // turn 2 kanan
  {x:-15, z:-180}, // turn 3 kiri
  {x:0, z:-240},   // turn 4 kanan
  {x:0, z:0}       // BACK TO START
];

// visualize track (simple road points)
for(let i=0;i<path.length;i++){
  const p = path[i];

  const marker = new THREE.Mesh(
    new THREE.BoxGeometry(10,0.1,20),
    new THREE.MeshStandardMaterial({color:0x111111})
  );
  marker.position.set(p.x,0,p.z);
  scene.add(marker);
}

// =====================
// ROAD MARKERS (CENTER LINE STYLE)
// =====================
for(let i=0;i<80;i++){
  const line = new THREE.Mesh(
    new THREE.BoxGeometry(0.2,0.1,2),
    new THREE.MeshBasicMaterial({color:0xffffff})
  );
  line.position.set(0,0.01,-i*5);
  scene.add(line);
}

// =====================
// SIMPLE CITY (BUILDINGS)
// =====================
function addBuilding(x,z){
  const b = new THREE.Mesh(
    new THREE.BoxGeometry(6,10+Math.random()*20,6),
    new THREE.MeshStandardMaterial({color:0x333333})
  );
  b.position.set(x,b.geometry.parameters.height/2,z);
  scene.add(b);
}

for(let i=0;i<20;i++){
  addBuilding(-25,-i*15);
  addBuilding(25,-i*15);
}

// =====================
// CAR
// =====================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.5,0.8,3),
  new THREE.MeshStandardMaterial({
    color:0xff0033,
    emissive:0xff0033,
    emissiveIntensity:0.4
  })
);

car.position.set(0,1,0);
scene.add(car);

// =====================
// CAMERA
// =====================
const camOffset = new THREE.Vector3(0,5,10);

// =====================
// CONTROL
// =====================
let steer = 0;
let speed = 0;

document.getElementById("left").ontouchstart = ()=>steer=0.08;
document.getElementById("right").ontouchstart = ()=>steer=-0.08;
document.getElementById("gas").ontouchstart = ()=>speed=0.6;

document.getElementById("left").ontouchend = ()=>steer=0;
document.getElementById("right").ontouchend = ()=>steer=0;
document.getElementById("gas").ontouchend = ()=>speed=0;

addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") steer=0.08;
  if(e.key==="ArrowRight") steer=-0.08;
  if(e.key==="ArrowUp") speed=0.6;
});
addEventListener("keyup",()=>{steer=0; speed=0;});

// =====================
// RACE LOGIC (FOLLOW POINTS)
// =====================
let index = 0;
let started = false;

function startRace(){
  started = true;
  document.getElementById("ui").innerText = "GO!";
}
document.getElementById("btn").onclick = startRace;

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  if(started){

    // steering manual
    car.rotation.y += steer;

    // movement
    car.position.x -= Math.sin(car.rotation.y)*speed;
    car.position.z -= Math.cos(car.rotation.y)*speed;

    // track follow assist (soft guide)
    const target = path[index];

    const dx = target.x - car.position.x;
    const dz = target.z - car.position.z;

    car.position.x += dx * 0.01;
    car.position.z += dz * 0.01;

    // next checkpoint
    if(Math.abs(dx)<3 && Math.abs(dz)<3){
      index++;
      if(index >= path.length){
        index = 0; // BACK TO START (LAP LOOP)
      }
    }
  }

  // CAMERA FOLLOW
  camera.position.x += (car.position.x + camOffset.x - camera.position.x)*0.1;
  camera.position.y = camOffset.y;
  camera.position.z += (car.position.z + camOffset.z - camera.position.z)*0.1;

  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

animate();

addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
