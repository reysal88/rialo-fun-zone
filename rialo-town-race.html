<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
<title>Tokyo Drift Pro Fixed</title>

<style>
  body { margin:0; overflow:hidden; background:#000; }

  #ui{
    position:absolute;
    top:10px;
    left:10px;
    color:#00ffff;
    font-family:Arial;
    font-size:13px;
    z-index:10;
    opacity:0.8;
  }
</style>
</head>

<body>
<div id="ui">Tokyo Drift Pro - Fixed Camera</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x050010, 30, 180);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0x222233));

const light = new THREE.DirectionalLight(0x00ffff, 1);
light.position.set(10,20,10);
scene.add(light);

// =====================
// ROAD (CENTERED TRACK)
// =====================
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(18, 600),
  new THREE.MeshStandardMaterial({color:0x0a0a0a})
);
road.rotation.x = -Math.PI/2;
road.position.z = -250;
scene.add(road);

// center line
const line = new THREE.Mesh(
  new THREE.PlaneGeometry(0.2, 600),
  new THREE.MeshStandardMaterial({color:0x00ffff, emissive:0x00ffff})
);
line.rotation.x = -Math.PI/2;
line.position.y = 0.01;
line.position.z = -250;
scene.add(line);

// =====================
// REALISTIC CITY GRID (FIXED)
// =====================
function building(x,z,h,color){
  const b = new THREE.Mesh(
    new THREE.BoxGeometry(6,h,6),
    new THREE.MeshStandardMaterial({
      color:0x111111,
      emissive:color,
      emissiveIntensity:0.4
    })
  );

  b.position.set(x,h/2,z);
  scene.add(b);
}

// structured skyline (not random chaos)
for(let i=0;i<60;i++){
  const z = -i*10;

  const h1 = 20 + (i%5)*8;
  const h2 = 25 + ((i+2)%6)*10;

  building(-14, z, h1, 0x00ffff);
  building( 14, z, h2, 0xff00ff);
}

// =====================
// CAR (CENTER OBJECT)
// =====================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.6,0.8,3),
  new THREE.MeshStandardMaterial({
    color:0xff0033,
    emissive:0xff0033,
    emissiveIntensity:0.5
  })
);

car.position.set(0,1,0);
scene.add(car);

// =====================
// CONTROL
// =====================
let steer = 0;
let speed = 0.45;

addEventListener("keydown",(e)=>{
  if(e.key==="ArrowLeft") steer = 0.08;
  if(e.key==="ArrowRight") steer = -0.08;
  if(e.key==="ArrowUp") speed = 0.7;
  if(e.key==="ArrowDown") speed = 0.2;
});

addEventListener("keyup",()=>steer=0);

// =====================
// CAMERA FIX (IMPORTANT PART)
// =====================
// kamera selalu di belakang mobil (CENTERED GAME VIEW)
const cameraOffset = new THREE.Vector3(0, 6, 12);

// =====================
// LOOP
// =====================
function animate(){
  requestAnimationFrame(animate);

  // movement
  car.rotation.y += steer;

  car.position.x -= Math.sin(car.rotation.y)*speed;
  car.position.z -= Math.cos(car.rotation.y)*speed;

  // =====================
  // FIXED CAMERA FOLLOW
  // =====================
  const behindX = car.position.x + Math.sin(car.rotation.y) * cameraOffset.z;
  const behindZ = car.position.z + Math.cos(car.rotation.y) * cameraOffset.z;

  camera.position.x += (behindX - camera.position.x)*0.1;
  camera.position.z += (behindZ - camera.position.z)*0.1;
  camera.position.y = 6;

  camera.lookAt(car.position.x, car.position.y, car.position.z);

  renderer.render(scene,camera);
}

animate();

// resize
addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>

</body>
</html>
