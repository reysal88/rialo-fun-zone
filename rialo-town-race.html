<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body{margin:0;overflow:hidden;background:#000;}
#controls{
 position:fixed;bottom:20px;width:100%;
 display:flex;justify-content:center;gap:10px;
}
.btn{
 width:65px;height:65px;
 background:#222;color:#fff;
 display:flex;align-items:center;justify-content:center;
 border-radius:10px;
}
</style>
</head>
<body>

<div id="controls">
<div class="btn" id="left">◀</div>
<div class="btn" id="gas">▲</div>
<div class="btn" id="right">▶</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ===== SCENE =====
const scene=new THREE.Scene();
scene.background=new THREE.Color(0x050510);

const camera=new THREE.PerspectiveCamera(75,innerWidth/innerHeight,0.1,1000);
const renderer=new THREE.WebGLRenderer();
renderer.setSize(innerWidth,innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== GROUND =====
const ground=new THREE.Mesh(
 new THREE.PlaneGeometry(800,800),
 new THREE.MeshBasicMaterial({color:0x0a0a0a})
);
ground.rotation.x=-Math.PI/2;
scene.add(ground);

// ===== ROAD LOOP (HALUS) =====
const curve=new THREE.CatmullRomCurve3([
 new THREE.Vector3(-60,0,60),
 new THREE.Vector3(60,0,60),
 new THREE.Vector3(100,0,0),
 new THREE.Vector3(60,0,-120),
 new THREE.Vector3(-60,0,-120),
 new THREE.Vector3(-100,0,0),
 new THREE.Vector3(-60,0,60)
],true);

const road=new THREE.Mesh(
 new THREE.TubeGeometry(curve,300,10,12,true),
 new THREE.MeshBasicMaterial({color:0x222222})
);
scene.add(road);

// ===== GARIS JALAN (NEON DASH) =====
const pts=curve.getPoints(300);
for(let i=0;i<pts.length;i+=8){
 const m=new THREE.Mesh(
   new THREE.BoxGeometry(0.5,0.1,2),
   new THREE.MeshBasicMaterial({color:0xffff00})
 );
 m.position.copy(pts[i]);
 m.position.y=0.6;
 scene.add(m);
}

// ===== DINDING NEON =====
for(let i=0;i<pts.length;i+=5){

 const left=new THREE.Mesh(
   new THREE.BoxGeometry(0.3,3,2),
   new THREE.MeshBasicMaterial({color:0x00ffff})
 );
 left.position.copy(pts[i]);
 left.position.x+=8;
 left.position.y=1.5;
 scene.add(left);

 const right=new THREE.Mesh(
   new THREE.BoxGeometry(0.3,3,2),
   new THREE.MeshBasicMaterial({color:0xff00ff})
 );
 right.position.copy(pts[i]);
 right.position.x-=8;
 right.position.y=1.5;
 scene.add(right);
}

// ===== MOBIL =====
const car=new THREE.Mesh(
 new THREE.BoxGeometry(2,1,4),
 new THREE.MeshBasicMaterial({color:0xff2222})
);
scene.add(car);

// ===== INPUT =====
let keys={};
addEventListener("keydown",e=>keys[e.key]=true);
addEventListener("keyup",e=>keys[e.key]=false);

function bind(id,key){
 const el=document.getElementById(id);
 el.ontouchstart=()=>keys[key]=true;
 el.ontouchend=()=>keys[key]=false;
}
bind("left","ArrowLeft");
bind("right","ArrowRight");
bind("gas","ArrowUp");

// ===== DRIVING =====
let t=0;
let speed=0;

function update(){

 if(keys["ArrowUp"]) speed+=0.002;
 speed*=0.98;

 if(keys["ArrowLeft"]) t-=0.003;
 if(keys["ArrowRight"]) t+=0.003;

 t+=speed;

 if(t>1)t-=1;
 if(t<0)t+=1;

 const pos=curve.getPointAt(t);
 const next=curve.getPointAt((t+0.01)%1);

 car.position.copy(pos);

 const dir=new THREE.Vector3().subVectors(next,pos);
 car.rotation.y=Math.atan2(-dir.x,-dir.z);
}

// ===== CAMERA (LOW BACK LIKE ASPHALT) =====
const offset=new THREE.Vector3(0,2,6);

function cam(){
 const m=new THREE.Matrix4();
 m.extractRotation(car.matrix);

 const pos=offset.clone().applyMatrix4(m).add(car.position);
 camera.position.lerp(pos,0.12);
 camera.lookAt(car.position);
}

// ===== LOOP =====
function animate(){
 requestAnimationFrame(animate);

 update();
 cam();

 renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
