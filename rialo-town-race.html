<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rialo Final Race</title>

<style>
body { margin:0; overflow:hidden; background:#000; }

#ui{
  position:absolute;
  top:10px;
  left:10px;
  color:white;
  font-family:Arial;
  font-size:18px;
}
#controls{
  position:fixed;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:10px;
}
.btn{
  width:65px;
  height:65px;
  background:#222;
  color:#fff;
  font-size:22px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="ui">Lap: 1 / 5</div>

<div id="controls">
  <div class="btn" id="left">◀</div>
  <div class="btn" id="gas">▲</div>
  <div class="btn" id="right">▶</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ===== SCENE =====
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(70, innerWidth/innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({antialias:false});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

scene.add(new THREE.AmbientLight(0xffffff,1));

// ===== TRACK =====
const curve = new THREE.CatmullRomCurve3([
  new THREE.Vector3(0,0,0),
  new THREE.Vector3(0,0,-60),
  new THREE.Vector3(40,0,-120),
  new THREE.Vector3(40,0,-160),
  new THREE.Vector3(0,0,-200),
  new THREE.Vector3(-40,0,-160),
  new THREE.Vector3(-40,0,-120),
  new THREE.Vector3(0,0,-60),
  new THREE.Vector3(0,0,0)
], true);

// ===== ROAD =====
const pts = curve.getPoints(200);

for(let i=0;i<pts.length-1;i++){
  const a=pts[i];
  const b=pts[i+1];

  const dx=b.x-a.x;
  const dz=b.z-a.z;
  const dist=Math.sqrt(dx*dx+dz*dz);

  const road=new THREE.Mesh(
    new THREE.BoxGeometry(10,0.2,dist),
    new THREE.MeshBasicMaterial({color:0x333333})
  );

  road.position.set((a.x+b.x)/2,0,(a.z+b.z)/2);
  road.rotation.y=Math.atan2(dx,dz);
  scene.add(road);
}

// ===== START / FINISH LINE =====
const line = new THREE.Mesh(
  new THREE.BoxGeometry(10,0.1,3),
  new THREE.MeshBasicMaterial({color:0xffffff})
);
line.position.set(0,0.2,0);
scene.add(line);

// ===== CHECKPOINTS (WAJIB URUT) =====
const checkpoints = [
  new THREE.Vector3(0,0,-60),
  new THREE.Vector3(40,0,-140),
  new THREE.Vector3(0,0,-200),
  new THREE.Vector3(-40,0,-140)
];

let cpIndex = 0;
let lap = 1;
let prevZ = 5;

// ===== CAR =====
const car=new THREE.Mesh(
  new THREE.BoxGeometry(1.5,0.7,3),
  new THREE.MeshBasicMaterial({color:0xff0000})
);
car.position.set(0,1,5);
scene.add(car);

// ===== INPUT =====
let keys={left:false,right:false,gas:false};

addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft") keys.left=true;
  if(e.key==="ArrowRight") keys.right=true;
  if(e.key==="ArrowUp") keys.gas=true;
});
addEventListener("keyup",e=>{
  if(e.key==="ArrowLeft") keys.left=false;
  if(e.key==="ArrowRight") keys.right=false;
  if(e.key==="ArrowUp") keys.gas=false;
});

function bind(id,key){
  const el=document.getElementById(id);
  el.ontouchstart=()=>keys[key]=true;
  el.ontouchend=()=>keys[key]=false;
}
bind("left","left");
bind("right","right");
bind("gas","gas");

// ===== DRIVE =====
let speed=0;

function updateCar(){
  if(keys.gas) speed+=0.04;
  speed*=0.97;
  if(speed>1.4) speed=1.4;

  if(keys.left) car.rotation.y+=0.04;
  if(keys.right) car.rotation.y-=0.04;

  car.position.x -= Math.sin(car.rotation.y)*speed;
  car.position.z -= Math.cos(car.rotation.y)*speed;
}

// ===== CHECKPOINT DETECTION =====
function near(a,b){
  return a.distanceTo(b) < 10;
}

// ===== RACE SYSTEM FINAL =====
function checkRace(){

  // checkpoint harus urut
  if(near(car.position, checkpoints[cpIndex])){
    cpIndex++;
  }

  // kalau semua checkpoint sudah dilewati
  if(cpIndex >= checkpoints.length){

    // crossing line (arah benar)
    if(prevZ > 0 && car.position.z <= 0){

      lap++;
      cpIndex = 0;

      if(lap > 5){
        alert("FINISH! 🏁");
        lap = 1;
      }

      document.getElementById("ui").innerText = "Lap: " + lap + " / 5";
    }
  }

  prevZ = car.position.z;
}

// ===== CAMERA =====
const offset=new THREE.Vector3(0,4,8);

function cam(){
  const m=new THREE.Matrix4();
  m.extractRotation(car.matrix);

  const behind=offset.clone().applyMatrix4(m);
  const pos=new THREE.Vector3().addVectors(car.position,behind);

  camera.position.lerp(pos,0.1);
  camera.lookAt(car.position);
}

// ===== LOOP =====
function animate(){
  requestAnimationFrame(animate);

  updateCar();
  checkRace();
  cam();

  renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
