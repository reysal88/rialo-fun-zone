<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>RIALO ROAD SYSTEM v1</title>

<style>
body { margin:0; overflow:hidden; background:#000; }
#info{
  position:absolute;
  top:10px; left:10px;
  color:#00ffff;
  font-family:Arial;
  z-index:10;
}
</style>
</head>

<body>
<div id="info">RIALO ROAD SYSTEM v1 (CURVED ROAD FIX)</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>

// ======================
// BASIC SETUP
// ======================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 50, 200);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,20,20);

const renderer = new THREE.WebGLRenderer({antialias:true});
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
scene.add(new THREE.AmbientLight(0x555555));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// ======================
// TRACK PATH (4 TURNS)
// ======================
const path = [
  new THREE.Vector3(0,0,0),
  new THREE.Vector3(-20,0,-60),
  new THREE.Vector3(20,0,-120),
  new THREE.Vector3(-20,0,-180),
  new THREE.Vector3(0,0,-240),
  new THREE.Vector3(0,0,0)
];

// ======================
// CURVED ROAD BUILDER
// ======================
for(let i=0;i<path.length-1;i++){

  const start = path[i];
  const end = path[i+1];

  const dx = end.x - start.x;
  const dz = end.z - start.z;

  const distance = Math.sqrt(dx*dx + dz*dz);

  // road segment
  const road = new THREE.Mesh(
    new THREE.BoxGeometry(10, 0.2, distance),
    new THREE.MeshStandardMaterial({color:0x111111})
  );

  // position midpoint
  road.position.set(
    (start.x + end.x)/2,
    0,
    (start.z + end.z)/2
  );

  // rotate to face next point (IMPORTANT FIX)
  road.rotation.y = Math.atan2(dx, dz);

  scene.add(road);
}

// ======================
// CENTER LINE MARKERS
// ======================
for(let i=0;i<80;i++){
  const line = new THREE.Mesh(
    new THREE.BoxGeometry(0.3,0.1,2),
    new THREE.MeshBasicMaterial({color:0xffffff})
  );
  line.position.set(0,0.2,-i*3);
  scene.add(line);
}

// ======================
// SIMPLE CAR
// ======================
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1.5,0.8,3),
  new THREE.MeshStandardMaterial({color:0xff0033})
);
car.position.set(0,1,5);
scene.add(car);

// ======================
// CAMERA FOLLOW
// ======================
function animate(){
  requestAnimationFrame(animate);

  // simple forward motion
  car.position.z -= 0.3;

  // camera follow
  camera.position.x += (car.position.x - camera.position.x)*0.05;
  camera.position.y = 12;
  camera.position.z += (car.position.z + 15 - camera.position.z)*0.05;

  camera.lookAt(car.position);

  renderer.render(scene,camera);
}

animate();

// resize
addEventListener("resize",()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth,innerHeight);
});

</script>
</body>
</html>
